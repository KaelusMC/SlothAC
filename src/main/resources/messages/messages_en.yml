help:
  - "<gradient:#8e9eab:#eef2f3>-------- [ Sloth ] --------</gradient>"
  - " <color:#00b4db>/<command> alerts</color> <gray>- Toggle violation alerts</gray>"
  - " <color:#00b4db>/<command> brands</color> <gray>- Toggle client brand notifications</gray>"
  - " <color:#00b4db>/<command> suspicious alerts</color> <gray>- Toggle suspicious player alerts</gray>"
  - " <color:#00b4db>/<command> suspicious <list|top|flagged></color> <gray>- View suspicious players</gray>"
  - " <color:#00b4db>/<command> profile <player></color> <gray>- View a player's profile</gray>"
  - " <color:#00b4db>/<command> monitor <player></color> <gray>- Live AI monitor for a player</gray>"
  - " <color:#00b4db>/<command> view</color> <gray>- Toggle observation mode for all players</gray>"
  - " <color:#00b4db>/<command> history <player> [page]</color> <gray>- View a player's violation history</gray>"
  - " <color:#00b4db>/<command> logs [page]</color> <gray>- View recent violations</gray>"
  - " <color:#00b4db>/<command> stats</color> <gray>- View server statistics</gray>"
  - " <color:#00b4db>/<command> dc <start|stop|status></color> <gray>- Manage data collection sessions</gray>"
  - " <color:#00b4db>/<command> punish reset <player></color> <gray>- Reset all of a player's violation levels</gray>"
  - " <color:#00b4db>/<command> exempt</color> <gray>- Exempt a player from checks</gray>"
  - " <color:#00b4db>/<command> reload</color> <gray>- Reload the configuration</gray>"
  - " <color:#00b4db>/<command> connect</color> <gray>- Link this server to the Sloth panel</gray>"
  - " <color:#00b4db>/<command> disconnect</color> <gray>- Unlink this server from the panel</gray>"
  - " <color:#00b4db>/<command> connect status</color> <gray>- Show the panel connection status</gray>"
  - " <color:#00b4db>/<command> help</color> <gray>- View this help message</gray>"

